<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Contacte</title>
    <!-- bootstrap per complementar el css i millorar el disseny-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- estils.css per els estils personalitzats -->
    <link rel="stylesheet" href="estils.css">
</head>
<body>
    <!-- Header -->

    <header>
        <div class="banner"></div>
        <nav class="navbar navbar-expand">
            <div class="container justify-content-center">
                <div class="navbar-nav">
                    <a class="nav-link" href="index.html">Presentació</a>
                    <a class="nav-link" href="hobbies.html">Aficions</a>
                    <a class="nav-link" href="trivial.html">Trivial Baldomero</a>
                    <a class="nav-link" href="contact.html">Contacte</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Formulari de contacte amb els diferents apartats -->
    <main class="container mt-5" style="max-width: 600px;">

        <h1 class="mb-1">Contacte</h1>
        <p class="text-muted mb-4">Omple el formulari i et respondré aviat.</p>

        <form id="contactForm">
            <label class="section-label">Nom</label>
            <input type="text" id="nom" placeholder="El teu nom" class="form-control mb-3">

            <label class="section-label">Email</label>
            <input type="email" id="email" placeholder="correu@exemple.com" class="form-control mb-3">

            <label class="section-label">Assumpte</label>
            <input type="text" id="assumpte" placeholder="Assumpte" class="form-control mb-3">

            <label class="section-label">Missatge</label>
            <textarea id="missatge" placeholder="Escriu el teu missatge..." class="form-control mb-4" rows="4"></textarea>

            <button type="submit" class="btn btn-dark px-4">Enviar</button>
        </form>

    </main>
    
    <footer class="text-center py-4 mt-5">
        <p>Fet per: Nil Jimenez</p>
        <a href="https://github.com/Nil-Jimenez"><img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="footer-icon" width="40"></a>
        <a href="https://www.linkedin.com/in/nil-jim%C3%A9nez-baa706364/"><img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" class="footer-icon" width="40"></a>
    </footer>

    <script>
        const email = document.getElementById("email");
        const nom = document.getElementById("nom");

        //detectar si el email es correcte o no, i posar un borde vermell si no ho es
        email.addEventListener("input", () => 
        {
            if (!email.value.includes("@")) 
            {
                email.classList.add("input-error");
            } else {
                email.classList.remove("input-error");
            }
        });

        //detectar si el nom te menys de 3 caracters, i posar un borde vermell si es el cas
        nom.addEventListener("input", () => 
        {
            if (nom.value.trim().length < 3)
             {
                nom.classList.add("input-error");
            } else {
                nom.classList.remove("input-error");
            }
        });
    </script>

</body>
</html>
